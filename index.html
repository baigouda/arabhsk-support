<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعلم الصينية بسهولة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #ddd;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 48px 24px;
            max-width: 480px;
        }
        .icon { font-size: 3.5rem; margin-bottom: 16px; }
        h1 { color: #f90; font-size: 2rem; margin-bottom: 8px; }
        .tagline { color: #999; font-size: 1rem; margin-bottom: 36px; }
        .links { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }
        .links a {
            display: block;
            padding: 14px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #f90;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: background 0.2s;
        }
        .links a:hover { background: #222; }
        .contact { color: #888; font-size: 0.85rem; line-height: 1.6; }
        .contact a { color: #f90; text-decoration: none; }
        .contact a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#x26A1;</div>
        <h1>تعلم الصينية بسهولة</h1>
        <p class="tagline">رفيقك في تعلم المفردات الصينية</p>
        <div class="links">
            <a href="privacy.html">سياسة الخصوصية</a>
            <a href="support.html">الدعم والأسئلة الشائعة</a>
        </div>
        <p class="contact">تواصل معنا: <a href="mailto:chinesewordsapp@outlook.com">chinesewordsapp@outlook.com</a></p>
    </div>
</body>
</html>
